
<style>
  body { font-family: sans-serif; padding: 12px; background: white; color: #222; }
  table { border-collapse: collapse; width: auto; }
  th, td { padding: 2px 4px; text-align: center; font-size: 11px; }
  td.row-label { text-align: left; color: #444; white-space: nowrap; padding-right: 8px; min-width: 0; }
  td.section-header { text-align: left; font-size: 9px; font-weight: bold; color: #999; text-transform: uppercase; letter-spacing: 0.06em; padding-top: 8px; padding-bottom: 1px; }
  th.col-head { font-size: 10px; font-weight: 600; color: #444; vertical-align: bottom; line-height: 1.3; min-width: 52px; }
  .cell-inner { border-radius: 3px; height: 18px; width: 44px; display: flex; align-items: center; justify-content: center; font-size: 11px; margin: auto; }
  .green-1 { background: #C0DD97; color: #27500A; }
  .green-2 { background: #688f33; color: #27500A; }
  .green-3 { background: #284a0b; color: #C0DD97; }
  .red-1   { background: #F09595; color: #791F1F; }
  .red-2   { background: #ba4e4e; color: #791F1F; }
  .red-3   { background: #751212; color: #f7bebe; }
  .empty   { background: #f4f4f2; }
  .legend  { display: flex; gap: 12px; margin-top: 10px; font-size: 10px; color: #555; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .lswatch { width: 18px; height: 11px; border-radius: 2px; }
  .gswatch { width: 36px; height: 11px; border-radius: 2px; margin-left: -9px;}
  .divider td { border-top: 1px solid #e8e8e8; padding-top: 1px; }
</style>

<table>
  <thead>
    <tr>
      <th></th>
      <th class="col-head">Black<br>woman</th>
      <th class="col-head">white<br>woman</th>
      <th class="col-head">Black<br>man</th>
      <th class="col-head">white<br>man</th>
    </tr>
  </thead>
  <tbody id="tb"></tbody>
</table>

<div class="legend">
  <span style="font-size:10px;color:#888;font-weight:600">&uarr; higher than N groups:</span>
  <div class="legend-item"><div class="lswatch" style="background:#C0DD97"></div> 1</div>
  <div class="legend-item"><div class="lswatch" style="background:#97C459"></div> 2</div>
  <div class="legend-item"><div class="lswatch" style="background:#3B6D11"></div> 3</div>
</div>
<div class="legend">
  <span style="font-size:10px;color:#888;font-weight:600">&darr; lower than N groups:</span>
  <div class="legend-item"><div class="lswatch" style="background:#F09595"></div> 1</div>
  <div class="legend-item"><div class="lswatch" style="background:#ba4e4e"></div> 2</div>
  <div class="legend-item"><div class="lswatch" style="background:#912020"></div> 3</div>
</div>
<div class="legend">
  <span style="font-size:10px;color:#888;font-weight:600">p-value (for themes):</span>
  0<div class="legend-item"><div class="gswatch" style="background:linear-gradient(to left, rgba(40,74,11,.1),rgba(40,74,11,1))"></div> .05 (&uarr;)</div>
  0<div class="legend-item"><div class="gswatch" style="background:linear-gradient(to left, rgba(145,32,32,.1),rgba(145,32,32,1))"></div> .05 (&darr;)</div>
</div>

<script>
var sections = [
{label: "Wording and semantics", winsOnly: true, rows: [{dim: "Semantic similarity", BW: 0, WW: 0, BM: 0, WM: 1}]},{label: "Psychological States", winsOnly: true, rows: [{dim: "Social processes", BW: 0, WW: 1, BM: 0, WM: 3}, {dim: "Health", BW: 1, WW: 0, BM: 1, WM: 1}, {dim: "Drives", BW: 0, WW: 1, BM: 1, WM: 0}, {dim: "Power", BW: 1, WW: 0, BM: 0, WM: 0}, {dim: "Work", BW: 1, WW: 0, BM: 0, WM: 0}, {dim: "Leisure", BW: 0, WW: 2, BM: 0, WM: 0}, {dim: "Valence", BW: 0, WW: 0, BM: 0, WM: 1}, {dim: "Arousal", BW: 0, WW: 0, BM: 0, WM: 2}, {dim: "Dominance", BW: 0, WW: 0, BM: 3, WM: 0}, {dim: "Warmth", BW: 0, WW: 0, BM: 3, WM: 0}, {dim: "Competence", BW: 0, WW: 0, BM: 0, WM: 3}]},{label: "Themes", winsOnly: false, rows: [{dim: "Self-awareness", BW: "", WW: "", BM: -0.0008, WM: ""}, {dim: "Gratitude", BW: "", WW: "", BM: -0.0216, WM: ""}, {dim: "Relationships", BW: "", WW: "", BM: -0.0004, WM: ""}, {dim: "Independence", BW: "", WW: 0.0204, BM: "", WM: ""}, {dim: "Hard work", BW: "", WW: -0.017, BM: "", WM: 0.0108}, {dim: "Faith", BW: "", WW: -0.0142, BM: "", WM: ""}, {dim: "Community", BW: "", WW: "", BM: 0.0384, WM: 0.0252}, {dim: "Growth", BW: "", WW: "", BM: -0.04, WM: ""}, {dim: "Love", BW: "", WW: 0.0452, BM: "", WM: ""}]}];
var groups = ["BW","WW","BM","WM"];
function winClass(n) {
  if (n===1) return "green-1";
  if (n===2) return "green-2";
  if (n>=3)  return "green-3";
  if (n===-1) return "red-1";
  if (n===-2) return "red-2";
  if (n<=-3)  return "red-3";
  return "empty";
}

var tb = document.getElementById("tb");
var html = "";
sections.forEach(function(sec, si) {
  html += '<tr' + (si>0?' class="divider"':'') + '><td class="section-header" colspan="5">' + sec.label + '</td></tr>';
  sec.rows.forEach(function(row) {
    html += '<tr><td class="row-label">' + row.dim + '</td>';
    groups.forEach(function(g) {
        var inner = "", cls = "empty", style = "";
        if (sec.winsOnly) {
          var w = row[g];
          if (w > 0) { cls = winClass(w); inner = "&uarr;"; }
          else if (w < 0) { cls = winClass(w); inner = "&darr;"; }
        } else {
          var v = parseFloat(row[g]);
          if (v > 0) {
            var alpha = Math.min(1 - (v*.9 / .05), 1);
            if (v < .025) {
                style = 'background:rgba(40,74,11,' + alpha + '); color:#C0DD97';
            } else {
                style = 'background:rgba(40,74,11,' + alpha + '); color:#27500A';
            }
            inner = "&uarr;";
          } else if (v < 0) {
            var alpha = Math.min(1 + (v*.9 / .05), 1);
            if (v > -.025) {
                style = 'background:rgba(117, 18, 18,' + alpha + '); color:#f7bebe';
            } else {
                style = 'background:rgba(117, 18, 18,' + alpha + '); color:#791F1F';
            }
            inner = "&darr;";
          }
        }
        html += '<td><div class="cell-inner ' + cls + '"' + (style ? ' style="' + style + '"' : '') + '>' + inner + '</div></td>';
    });
    html += '</tr>';
  });
});
tb.innerHTML = html;
</script>
